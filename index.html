<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Hero -->
    <section class="et-hero-tabs">
      <img src="images/logo.png" alt="logo" class="et-hero-tabs__logo" />
      <div class="et-hero-tabs-container">
        <a class="et-hero-tab" href="#home">Home</a>
        <a class="et-hero-tab" href="#about">About</a>
        <a class="et-hero-tab" href="#services">Services</a>
        <a class="et-hero-tab" href="#contact">Contact</a>
        <a class="et-hero-tab" href="#tab-other">Other</a>
        <span class="et-hero-tab-slider"></span>
      </div>
    </section>

    <!-- Main -->
    <main class="et-main">
      <section class="et-slide" id="home">
        <img class="flyer" src="images/IMG-20260308-WA0000.jpg" alt="Home" />
      </section>
      <section class="et-slide" id="about">
        <h1>ABOUT</h1>
        <h3>something about about</h3>
      </section>
      <section class="et-slide" id="services">
        <h1>Services</h1>
        <h3>something about services</h3>
      </section>
      <section class="et-slide" id="contact">
        <h1>Contact</h1>
        <h3>something about contact</h3>
      </section>
      <section class="et-slide" id="tab-other">
        <h1>Other</h1>
        <h3>something about other</h3>
      </section>
    </main>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
